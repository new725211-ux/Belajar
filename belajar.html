
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal RPP Matematika</title>
    
    <!-- Tailwind CSS (Untuk Styling) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel (Agar browser bisa membaca kode React/JSX di dalam HTML) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-50">
    
    <!-- Wadah untuk React -->
    <div id="root"></div>

    <!-- Kode React -->
    <script type="text/babel">
        const { useState } = React;

        // --- Ikon-Ikon SVG (Pengganti Lucide React) ---
        const IconCalculator = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="4" y="2" width="16" height="20" rx="2" ry="2"></rect><line x1="8" y1="6" x2="16" y2="6"></line><line x1="16" y1="14" x2="16" y2="18"></line><path d="M16 10h.01"></path><path d="M12 10h.01"></path><path d="M8 10h.01"></path><path d="M12 14h.01"></path><path d="M8 14h.01"></path><path d="M12 18h.01"></path><path d="M8 18h.01"></path></svg>;
        const IconMail = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>;
        const IconLock = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>;
        const IconUser = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>;
        const IconLogOut = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>;
        const IconChevronLeft = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>;
        const IconBookOpen = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg>;
        const IconUpload = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>;
        const IconFileText = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>;
        const IconTrash = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>;

        function App() {
            // State Management
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            const [view, setView] = useState('classes');
            const [selectedClass, setSelectedClass] = useState(null);
            const [selectedSemester, setSelectedSemester] = useState(null);
            const [showUploadModal, setShowUploadModal] = useState(false);
            
            // Dummy Data for Materials
            const [materials, setMaterials] = useState([
                { id: 1, title: 'RPP Bilangan Bulat', class: 4, semester: 1, date: '2026-07-01', type: 'RPP' },
                { id: 2, title: 'Modul Pecahan', class: 5, semester: 1, date: '2026-07-02', type: 'Materi' },
                { id: 3, title: 'Latihan Soal Bangun Ruang', class: 6, semester: 2, date: '2026-07-03', type: 'Latihan' },
            ]);

            const [newTitle, setNewTitle] = useState('');
            const [newType, setNewType] = useState('RPP');

            // --- Handlers ---
            const handleLogin = (e) => {
                e.preventDefault();
                setIsLoggedIn(true);
            };

            const handleLogout = () => {
                setIsLoggedIn(false);
                setView('classes');
                setSelectedClass(null);
                setSelectedSemester(null);
            };

            const handleSelectClass = (cls) => {
                setSelectedClass(cls);
                setView('semesters');
            };

            const handleSelectSemester = (sem) => {
                setSelectedSemester(sem);
                setView('materials');
            };

            const handleBack = () => {
                if (view === 'materials') {
                    setView('semesters');
                    setSelectedSemester(null);
                } else if (view === 'semesters') {
                    setView('classes');
                    setSelectedClass(null);
                }
            };

            const handleUpload = (e) => {
                e.preventDefault();
                if (!newTitle.trim()) return;

                const newMaterial = {
                    id: Date.now(),
                    title: newTitle,
                    class: selectedClass,
                    semester: selectedSemester,
                    date: new Date().toISOString().split('T')[0],
                    type: newType
                };

                setMaterials([newMaterial, ...materials]);
                setNewTitle('');
                setShowUploadModal(false);
            };

            const handleDelete = (id) => {
                setMaterials(materials.filter(m => m.id !== id));
            };

            // --- Tampilan Login ---
            if (!isLoggedIn) {
                return (
                <div className="min-h-screen bg-gradient-to-br from-blue-500 to-indigo-700 flex items-center justify-center p-4">
                    <div className="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden">
                    <div className="bg-blue-600 p-8 text-center">
                        <div className="w-16 h-16 bg-white rounded-full flex items-center justify-center mx-auto mb-4 shadow-lg">
                        <IconCalculator className="text-blue-600 w-8 h-8" />
                        </div>
                        <h1 className="text-2xl font-bold text-white mb-2">Portal Guru Matematika</h1>
                        <p className="text-blue-100 text-sm">Manajemen Bahan Ajar & RPP SD</p>
                    </div>
                    <div className="p-8">
                        <form onSubmit={handleLogin} className="space-y-6">
                        <div>
                            <label className="block text-sm font-medium text-gray-700 mb-2">Email</label>
                            <div className="relative">
                            <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <IconMail className="h-5 w-5 text-gray-400" />
                            </div>
                            <input 
                                type="email" 
                                className="pl-10 w-full border border-gray-300 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all"
                                placeholder="guru@sekolah.com"
                                defaultValue="admin@matematika.id"
                                required
                            />
                            </div>
                        </div>
                        <div>
                            <label className="block text-sm font-medium text-gray-700 mb-2">Password</label>
                            <div className="relative">
                            <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <IconLock className="h-5 w-5 text-gray-400" />
                            </div>
                            <input 
                                type="password" 
                                className="pl-10 w-full border border-gray-300 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all"
                                placeholder="••••••••"
                                defaultValue="password123"
                                required
                            />
                            </div>
                        </div>
                        <button 
                            type="submit" 
                            className="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-xl px-4 py-3 transition-colors duration-200 shadow-md hover:shadow-lg"
                        >
                            Masuk ke Portal
                        </button>
                        </form>
                    </div>
                    </div>
                </div>
                );
            }

            // --- Tampilan Dashboard Utama ---
            return (
                <div className="min-h-screen bg-slate-50 font-sans text-slate-800">
                {/* Navigasi Atas */}
                <nav className="bg-white border-b border-slate-200 sticky top-0 z-10 shadow-sm">
                    <div className="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
                    <div className="flex justify-between h-16 items-center">
                        <div className="flex items-center gap-3 cursor-pointer" onClick={() => { setView('classes'); setSelectedClass(null); setSelectedSemester(null); }}>
                        <div className="bg-blue-600 p-2 rounded-lg">
                            <IconCalculator className="text-white w-5 h-5" />
                        </div>
                        <div>
                            <h1 className="font-bold text-lg leading-tight text-slate-800">Portal Matematika</h1>
                            <p className="text-xs text-slate-500">Gudang RPP & Materi</p>
                        </div>
                        </div>
                        <div className="flex items-center gap-4">
                        <div className="hidden sm:flex items-center gap-2 text-sm font-medium text-slate-600 bg-slate-100 px-3 py-1.5 rounded-full">
                            <IconUser className="w-4 h-4" />
                            <span>Bpk/Ibu Guru</span>
                        </div>
                        <button 
                            onClick={handleLogout}
                            className="p-2 text-slate-500 hover:text-red-600 hover:bg-red-50 rounded-full transition-colors"
                            title="Keluar"
                        >
                            <IconLogOut className="w-5 h-5" />
                        </button>
                        </div>
                    </div>
                    </div>
                </nav>

                <main className="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
                    
                    {/* Tombol Kembali */}
                    {view !== 'classes' && (
                    <div className="mb-6 flex items-center">
                        <button 
                        onClick={handleBack}
                        className="flex items-center gap-2 text-blue-600 hover:text-blue-800 font-medium transition-colors bg-blue-50 hover:bg-blue-100 px-4 py-2 rounded-lg"
                        >
                        <IconChevronLeft className="w-5 h-5" />
                        Kembali
                        </button>
                        <div className="ml-4 text-slate-500 text-sm font-medium">
                        Kelas {selectedClass} {selectedSemester ? `> Semester ${selectedSemester}` : ''}
                        </div>
                    </div>
                    )}

                    {/* VIEW: Pilih Kelas */}
                    {view === 'classes' && (
                    <div>
                        <div className="mb-8 text-center sm:text-left">
                        <h2 className="text-3xl font-bold text-slate-900 mb-2">Pilih Kelas</h2>
                        <p className="text-slate-500">Pilih kelas untuk mengelola RPP dan Bahan Ajar Matematika.</p>
                        </div>
                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                        {[3, 4, 5, 6].map((cls) => (
                            <button
                            key={cls}
                            onClick={() => handleSelectClass(cls)}
                            className="group relative bg-white border border-slate-200 rounded-2xl p-6 hover:border-blue-500 hover:shadow-xl transition-all duration-300 text-left overflow-hidden flex flex-col items-center sm:items-start"
                            >
                            <div className="absolute -right-6 -top-6 w-24 h-24 bg-blue-50 rounded-full group-hover:bg-blue-600 transition-colors duration-300 z-0"></div>
                            <div className="relative z-10 bg-blue-100 text-blue-600 group-hover:bg-white group-hover:text-blue-600 p-4 rounded-xl mb-4 transition-colors duration-300">
                                <IconBookOpen className="w-8 h-8" />
                            </div>
                            <h3 className="relative z-10 text-2xl font-bold text-slate-800 group-hover:text-blue-700 transition-colors">Kelas {cls}</h3>
                            <p className="relative z-10 text-slate-500 mt-2 text-sm text-center sm:text-left">Kelola materi matematika kelas {cls} SD.</p>
                            </button>
                        ))}
                        </div>
                    </div>
                    )}

                    {/* VIEW: Pilih Semester */}
                    {view === 'semesters' && (
                    <div>
                        <div className="mb-8 text-center sm:text-left">
                        <h2 className="text-3xl font-bold text-slate-900 mb-2">Kelas {selectedClass} - Pilih Semester</h2>
                        <p className="text-slate-500">Pilih semester ganjil atau genap untuk melihat dokumen.</p>
                        </div>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6 max-w-4xl">
                        <button
                            onClick={() => handleSelectSemester(1)}
                            className="bg-white border-2 border-transparent hover:border-indigo-400 rounded-2xl p-8 shadow-sm hover:shadow-lg transition-all duration-300 flex items-center gap-6"
                        >
                            <div className="bg-indigo-100 text-indigo-600 p-4 rounded-2xl flex-shrink-0">
                            <span className="text-3xl font-black">1</span>
                            </div>
                            <div className="text-left">
                            <h3 className="text-2xl font-bold text-slate-800 mb-1">Semester Ganjil</h3>
                            <p className="text-slate-500">Bulan Juli - Desember</p>
                            </div>
                        </button>

                        <button
                            onClick={() => handleSelectSemester(2)}
                            className="bg-white border-2 border-transparent hover:border-teal-400 rounded-2xl p-8 shadow-sm hover:shadow-lg transition-all duration-300 flex items-center gap-6"
                        >
                            <div className="bg-teal-100 text-teal-600 p-4 rounded-2xl flex-shrink-0">
                            <span className="text-3xl font-black">2</span>
                            </div>
                            <div className="text-left">
                            <h3 className="text-2xl font-bold text-slate-800 mb-1">Semester Genap</h3>
                            <p className="text-slate-500">Bulan Januari - Juni</p>
                            </div>
                        </button>
                        </div>
                    </div>
                    )}

                    {/* VIEW: Manajemen Materi */}
                    {view === 'materials' && (
                    <div>
                        
                        <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-8 gap-4">
                        <div>
                            <h2 className="text-3xl font-bold text-slate-900 mb-2">
                            RPP & Materi
                            </h2>
                            <p className="text-slate-500">
                            Matematika • Kelas {selectedClass} • Semester {selectedSemester}
                            </p>
                        </div>
                        <button 
                            onClick={() => setShowUploadModal(true)}
                            className="flex items-center gap-2 bg-blue-600 hover:bg-blue-700 text-white px-5 py-2.5 rounded-xl font-medium transition-all shadow-md hover:shadow-lg w-full sm:w-auto justify-center"
                        >
                            <IconUpload className="w-5 h-5" />
                            Unggah Berkas
                        </button>
                        </div>

                        <div className="bg-white border border-slate-200 rounded-2xl overflow-hidden shadow-sm">
                        {materials.filter(m => m.class === selectedClass && m.semester === selectedSemester).length === 0 ? (
                            <div className="p-12 text-center flex flex-col items-center">
                            <div className="bg-slate-50 p-4 rounded-full mb-4">
                                <IconFileText className="w-12 h-12 text-slate-300" />
                            </div>
                            <h3 className="text-lg font-medium text-slate-900 mb-1">Belum ada dokumen</h3>
                            <p className="text-slate-500">Mulai unggah RPP atau bahan ajar untuk kelas ini.</p>
                            </div>
                        ) : (
                            <div className="divide-y divide-slate-100">
                            {materials
                                .filter(m => m.class === selectedClass && m.semester === selectedSemester)
                                .map((item) => (
                                <div key={item.id} className="p-4 sm:p-6 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 hover:bg-slate-50 transition-colors">
                                    <div className="flex items-start gap-4">
                                    <div className={`p-3 rounded-xl mt-1 sm:mt-0 flex-shrink-0 ${
                                        item.type === 'RPP' ? 'bg-blue-100 text-blue-600' :
                                        item.type === 'Materi' ? 'bg-purple-100 text-purple-600' :
                                        'bg-orange-100 text-orange-600'
                                    }`}>
                                        <IconFileText className="w-6 h-6" />
                                    </div>
                                    <div>
                                        <h4 className="font-semibold text-slate-900 text-lg mb-1">{item.title}</h4>
                                        <div className="flex items-center gap-3 text-xs sm:text-sm text-slate-500 font-medium">
                                        <span className="bg-slate-100 px-2 py-1 rounded text-slate-600">{item.type}</span>
                                        <span>Diunggah: {item.date}</span>
                                        </div>
                                    </div>
                                    </div>
                                    <button 
                                    onClick={() => handleDelete(item.id)}
                                    className="text-slate-400 hover:text-red-500 hover:bg-red-50 p-2 rounded-lg transition-colors ml-auto sm:ml-0"
                                    title="Hapus Dokumen"
                                    >
                                    <IconTrash className="w-5 h-5" />
                                    </button>
                                </div>
                                ))}
                            </div>
                        )}
                        </div>
                    </div>
                    )}

                </main>

                {/* Upload Modal (Overlay) */}
                {showUploadModal && (
                    <div className="fixed inset-0 bg-slate-900/50 flex items-center justify-center p-4 z-50">
                    <div className="bg-white rounded-2xl w-full max-w-md shadow-2xl overflow-hidden">
                        <div className="px-6 py-4 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                        <h3 className="font-bold text-lg text-slate-800">Unggah Dokumen Baru</h3>
                        <button onClick={() => setShowUploadModal(false)} className="text-slate-400 hover:text-slate-600 text-xl font-bold">
                            &times;
                        </button>
                        </div>
                        <form onSubmit={handleUpload} className="p-6 space-y-4">
                        <div>
                            <label className="block text-sm font-medium text-slate-700 mb-1">Judul Dokumen</label>
                            <input 
                            type="text" 
                            value={newTitle}
                            onChange={(e) => setNewTitle(e.target.value)}
                            placeholder="Misal: RPP Bab Pecahan"
                            className="w-full border border-slate-300 rounded-xl px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-shadow"
                            required
                            />
                        </div>
                        <div>
                            <label className="block text-sm font-medium text-slate-700 mb-1">Jenis Dokumen</label>
                            <select 
                            value={newType}
                            onChange={(e) => setNewType(e.target.value)}
                            className="w-full border border-slate-300 rounded-xl px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-shadow bg-white"
                            >
                            <option value="RPP">RPP (Rencana Pelaksanaan Pembelajaran)</option>
                            <option value="Materi">Bahan Materi Lengkap</option>
                            <option value="Latihan">Lembar Kerja / Latihan</option>
                            </select>
                        </div>
                        
                        <div className="pt-4 flex gap-3">
                            <button 
                            type="button" 
                            onClick={() => setShowUploadModal(false)}
                            className="flex-1 bg-white border border-slate-300 text-slate-700 font-medium py-2.5 rounded-xl hover:bg-slate-50 transition-colors"
                            >
                            Batal
                            </button>
                            <button 
                            type="submit" 
                            className="flex-1 bg-blue-600 text-white font-medium py-2.5 rounded-xl hover:bg-blue-700 transition-colors shadow-sm"
                            >
                            Simpan & Unggah
                            </button>
                        </div>
                        </form>
                    </div>
                    </div>
                )}

                </div>
            );
        }

        // --- Inisialisasi React ke dalam Div HTML ---
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

```
